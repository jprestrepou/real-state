services:
  - type: web
    name: pms-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pms-db
          property: connectionString
      - key: APP_NAME
        value: "Property Management System"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["https://real-state-1-2qpr.onrender.com"]'
